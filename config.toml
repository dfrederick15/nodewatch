# AllStar Node Monitor — Configuration
# Saved by nodewatch settings panel. Restart to apply changes.

[server]
port                 = 8080
host                 = "0.0.0.0"
poll_interval_ms     = 1000
ami_connect_timeout_s = 5
ami_read_timeout_s   = 5

[auth]
username         = "admin"
password         = "changeme"
session_timeout_s = 3600

[display]
callsign         = "W1ABC"
title            = "AllStar Monitor"
location         = "Anytown, USA"
max_nodes        = 0
show_never_heard = true
timezone         = "America/New_York"

[favorites]
nodes = []

[[nodes]]
node        = 1234
host        = "127.0.0.1"
user        = "admin"
password    = "secret"
label       = "Home Node"
private     = false
stream_url  = ""
website_url = ""

[[commands]]
label   = "Node Status"
command = "rpt xnode %node%"

[[commands]]
label   = "Link Stats"
command = "rpt lstats %node%"

[[commands]]
label   = "Disable Linking"
command = "rpt fun %node% *70"

[[commands]]
label   = "Enable Linking"
command = "rpt fun %node% *71"

[[commands]]
label   = "Asterisk Version"
command = "core show version"

[[commands]]
label   = "Active Channels"
command = "core show channels"

[[commands]]
label   = "Reload Dialplan"
command = "dialplan reload"

[[commands]]
label   = "Reload IAX2"
command = "module reload chan_iax2.so"

[[commands]]
label   = "Reload app_rpt"
command = "module reload app_rpt.so"

[[schedules]]
label      = "Morning Check"
node       = 1234
remote     = 99999
days       = ["mon", "wed", "fri"]
connect    = "08:00"
disconnect = "08:30"
mode       = "connect"
permanent  = false
enabled    = true
