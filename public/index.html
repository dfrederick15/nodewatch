<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllStar Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link id="theme-css" rel="stylesheet" href="theme-amber.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ── -->
<header>
  <div>
    <div class="callsign" id="hdr-callsign">AllStar</div>
    <div class="subtitle" id="hdr-subtitle">Monitor</div>
  </div>
  <div id="hdr-ips"></div>
  <div class="spacer"></div>
  <div id="clock-area" title="UTC time from pool.ntp.org">
    <span id="clock">--:--:--</span>
    <span id="clock-label">UTC</span>
  </div>
  <div id="status-area">
    <span id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>
  <span id="spinner">|</span>
  <select id="theme-select" title="Switch theme" aria-label="Switch theme"></select>
  <div id="auth-area">
    <span id="auth-label">Not logged in</span>
    <button id="btn-login">Login</button>
    <button id="btn-logout" style="display:none">Logout</button>
  </div>
</header>

<!-- ── Tab bar ── -->
<nav id="tab-bar">
  <button class="tab-btn active" data-tab="home">Home</button>
  <button class="tab-btn" data-tab="favorites">Favorites</button>
  <button class="tab-btn" data-tab="schedule">Schedule</button>
  <button class="tab-btn" data-tab="settings">Settings</button>
</nav>

<!-- ── Main layout ── -->
<main id="main-layout">

  <!-- ── Sidebar (Home tab only) ── -->
  <aside id="sidebar">

    <section>
      <h3>Node Selection</h3>
      <div class="field-row">
        <label>Local Node</label>
        <select id="local-node"></select>
      </div>
      <div class="field-row">
        <label>Remote Node / DTMF</label>
        <input type="text" id="remote-input" placeholder="e.g. 27339 or *70">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="perm-check">
        <label for="perm-check">Permanent (survives rpt restart)</label>
      </div>
    </section>

    <section id="link-controls" style="display:none">
      <h3>Link</h3>
      <div class="btn-row">
        <button id="btn-connect" class="primary">Connect</button>
        <button id="btn-monitor">Monitor</button>
        <button id="btn-localmon">Local Mon</button>
        <button id="btn-disconnect" class="danger">Disconnect</button>
      </div>
    </section>

    <section id="cmd-controls" style="display:none">
      <h3>Commands</h3>
      <div class="btn-row">
        <button id="btn-dtmf">Send DTMF</button>
      </div>
    </section>

    <section id="control-panel" style="display:none">
      <h3>Control Panel</h3>
      <div class="field-row">
        <label>Command</label>
        <select id="cmd-select"></select>
      </div>
      <button id="btn-run-cmd" class="primary">Execute</button>
    </section>

    <section>
      <h3>Output</h3>
      <div id="result-box"></div>
    </section>

  </aside>

  <!-- ── Content area (swaps between tabs) ── -->
  <div id="content-area">

    <!-- Home tab -->
    <div id="tab-home" class="tab-panel active">
      <div id="nodes-area">
        <div style="color:var(--muted); padding:20px; font-size:13px;">
          Connecting to server…
        </div>
      </div>
    </div>

    <!-- Favorites tab -->
    <div id="tab-favorites" class="tab-panel">
      <div id="favorites-area"></div>
    </div>

    <!-- Schedule tab -->
    <div id="tab-schedule" class="tab-panel">
      <div id="schedule-area"></div>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-panel">
      <div id="settings-area"></div>
    </div>

  </div>

</main>

<!-- ── Login dialog ── -->
<div id="login-dialog">
  <div class="dialog-box">
    <h2>Login</h2>
    <div class="field-row">
      <label>Username</label>
      <input type="text" id="dlg-user" autocomplete="username" autocapitalize="none">
    </div>
    <div class="field-row">
      <label>Password</label>
      <input type="password" id="dlg-pass" autocomplete="current-password">
    </div>
    <div class="error-msg" id="dlg-error">Invalid credentials.</div>
    <div class="btn-row">
      <button id="dlg-submit" class="primary">Login</button>
      <button id="dlg-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Change Password dialog ── -->
<div id="chpw-dialog">
  <div class="dialog-box">
    <h2>Change Password</h2>
    <p id="chpw-reason" class="chpw-reason"></p>
    <div class="field-row">
      <label>Current Password</label>
      <input type="password" id="chpw-current" autocomplete="current-password">
    </div>
    <div class="field-row">
      <label>New Password</label>
      <input type="password" id="chpw-new" autocomplete="new-password">
    </div>
    <div class="field-row">
      <label>Confirm New Password</label>
      <input type="password" id="chpw-confirm" autocomplete="new-password">
    </div>
    <div class="error-msg" id="chpw-error"></div>
    <div class="btn-row">
      <button id="chpw-submit" class="primary">Change Password</button>
      <button id="chpw-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Schedule modal ── -->
<div id="sched-modal">
  <div class="sched-modal-box">
    <h3 id="sched-modal-title">Add Schedule</h3>
    <div class="field-row">
      <label>Label</label>
      <input type="text" id="sm-label" placeholder="e.g. Wednesday Net">
    </div>
    <div class="field-row">
      <label>Local Node</label>
      <select id="sm-node"></select>
    </div>
    <div class="field-row">
      <label>Remote Node</label>
      <input type="number" id="sm-remote" placeholder="e.g. 67890">
    </div>
    <div>
      <label style="display:block;margin-bottom:6px">Days</label>
      <div class="sched-days-row" id="sm-days">
        <label><input type="checkbox" value="sun"> Sun</label>
        <label><input type="checkbox" value="mon"> Mon</label>
        <label><input type="checkbox" value="tue"> Tue</label>
        <label><input type="checkbox" value="wed"> Wed</label>
        <label><input type="checkbox" value="thu"> Thu</label>
        <label><input type="checkbox" value="fri"> Fri</label>
        <label><input type="checkbox" value="sat"> Sat</label>
      </div>
    </div>
    <div class="field-row">
      <label>Connect Time</label>
      <input type="time" id="sm-connect">
    </div>
    <div class="field-row">
      <label>Disconnect Time <span class="muted" style="font-size:11px">(optional)</span></label>
      <input type="time" id="sm-disconnect">
    </div>
    <div class="field-row">
      <label>Mode</label>
      <select id="sm-mode">
        <option value="connect">Connect</option>
        <option value="monitor">Monitor</option>
        <option value="localmonitor">Local Monitor</option>
      </select>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="sm-permanent">
      <label for="sm-permanent">Permanent link (survives rpt restart)</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="sm-enabled" checked>
      <label for="sm-enabled">Enabled</label>
    </div>
    <div class="sched-modal-error" id="sm-error"></div>
    <div class="sched-modal-actions">
      <button id="sm-delete" class="danger" style="margin-right:auto;display:none">Delete</button>
      <button id="sm-cancel">Cancel</button>
      <button id="sm-save" class="primary">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

<footer id="site-footer">
  &copy; 2026 Devin Frederick &mdash; K4OZI &mdash; MIT License
</footer>

</body>
</html>
